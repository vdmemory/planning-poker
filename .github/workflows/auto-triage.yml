name: Auto-triage

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: read
  issues: write
  models: read

jobs:
  triage:
    # Run on every newly opened issue OR when "re-triage" label is added.
    # Avoid running on every label change to prevent loops.
    if: |
      github.event.action == 'opened' ||
      (github.event.action == 'labeled' && github.event.label.name == 're-triage')
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run triage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python .github/scripts/auto_triage.py

      - name: Remove "re-triage" label if it was the trigger
        if: github.event.action == 'labeled' && github.event.label.name == 're-triage'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sS -X DELETE \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/labels/re-triage" \
            > /dev/null
