name: Auto-promote dev → main

# After every push to `dev` (= a feature PR was merged), make sure there is
# always an open PR from `dev` to `main` ready to be reviewed. The PR doesn't
# auto-merge — it waits for human review and CI to be green.
#
# Why bother? Without this, the next "release" requires manually clicking
# "New PR → dev → main" each time. With it, you just watch the existing PR
# grow as features land and merge it when ready.
on:
  push:
    branches: [dev]

permissions:
  contents: read
  pull-requests: write

# Avoid races if two pushes land back to back.
concurrency:
  group: auto-promote-dev-main
  cancel-in-progress: false

jobs:
  ensure-pr:
    # Skip when the commit itself was authored by release-please or by us
    # promoting `main` back into `dev`. Otherwise we'd risk a noisy loop.
    if: |
      github.event.head_commit.author.email != 'github-actions[bot]@users.noreply.github.com' &&
      !startsWith(github.event.head_commit.message, 'Merge branch ''main''')
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history for the changelog summary

      - name: Ensure a PR dev → main exists
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # If a PR is already open, GitHub auto-tracks new commits — nothing to do.
          existing=$(gh pr list --base main --head dev --state open \
                       --json number --jq '.[0].number' || true)
          if [ -n "$existing" ]; then
            echo "PR #$existing already open — it picks up the new commits automatically."
            exit 0
          fi

          # Compose a body listing commits since main.
          commits=$(git log origin/main..origin/dev --pretty='- %s (%h)' || true)
          if [ -z "$commits" ]; then
            commits="(no commits yet — this PR will fill up as features merge to dev)"
          fi

          body=$(cat <<EOF
          ## What this PR is

          Aggregates everything that has landed on \`dev\` since the last merge to \`main\`. Merge it (with a **regular merge commit**, not squash) when you're ready to promote a batch of changes to production.

          Once merged, release-please opens the next \`chore(main): release\` PR with version bump + CHANGELOG.

          ## Commits in this promotion

          $commits

          ## Merge method

          Use **Create a merge commit** (the second option in the dropdown). Squashing here would collapse all \`feat:\` / \`fix:\` commits into one PR title and release-please would miss them.

          ---

          <sub>Auto-opened by \`.github/workflows/auto-promote.yml\` after a push to dev. Future pushes update this PR automatically — no need to recreate it.</sub>
          EOF
          )

          gh pr create \
            --base main \
            --head dev \
            --title "chore: promote dev to main" \
            --body "$body"
