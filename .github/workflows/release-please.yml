name: Release Please

on:
  push:
    branches: [main]

# Lets release-please open release PRs, push CHANGELOG updates, and create
# GitHub Releases / tags. Nothing here pushes directly to main — it opens
# a "release PR" you review and merge yourself.
permissions:
  contents: write
  pull-requests: write

# Don't run two release-please instances in parallel; the next push waits.
concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
